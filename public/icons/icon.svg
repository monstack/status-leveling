<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a0f1e"/>
  <!-- Sword icon -->
  <g transform="translate(256,256)">
    <!-- Blade -->
    <rect x="-16" y="-180" width="32" height="260" rx="6" fill="#60a5fa"/>
    <!-- Cross guard -->
    <rect x="-70" y="60" width="140" height="28" rx="8" fill="#94a3b8"/>
    <!-- Handle -->
    <rect x="-14" y="88" width="28" height="80" rx="6" fill="#475569"/>
    <!-- Pommel -->
    <ellipse cx="0" cy="178" rx="22" ry="18" fill="#64748b"/>
    <!-- Blade shine -->
    <rect x="-4" y="-170" width="8" height="200" rx="4" fill="#bfdbfe" opacity="0.5"/>
    <!-- Tip -->
    <polygon points="-16,-180 16,-180 0,-230" fill="#60a5fa"/>
  </g>
</svg>
